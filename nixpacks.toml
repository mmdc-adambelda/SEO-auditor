[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npm install -g pnpm@9",
  "pnpm install --frozen-lockfile"
]

[phases.build]
cmds = [
  "pnpm --filter @seo-auditor/database generate",
  "pnpm --filter @seo-auditor/api build"
]

[start]
cmd = "npx --yes prisma migrate deploy --schema=./packages/database/prisma/schema.prisma && node apps/api/dist/index.js"
